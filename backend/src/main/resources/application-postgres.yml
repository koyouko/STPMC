# PostgreSQL profile — activate with --spring.profiles.active=postgres
# Defaults match docker-compose.yml (lenseiq-postgres service)
# Override with env vars for production: DB_URL, DB_USERNAME, DB_PASSWORD

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mission_control}
    username: ${DB_USERNAME:mission_control}
    password: ${DB_PASSWORD:mission_control}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}
