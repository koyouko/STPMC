services:
  # ── PostgreSQL (LenseIQ persistence) ────────────────────────────
  postgres:
    image: postgres:16
    container_name: stp-mission-control-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mission_control}
      POSTGRES_USER: ${POSTGRES_USER:-mission_control}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mission_control}
    ports:
      - "5432:5432"
    volumes:
      - mission-control-postgres:/var/lib/postgresql/data

  # ── Confluent Platform 7.9 — single-node KRaft broker ───────────
  kafka:
    image: confluentinc/cp-kafka:7.9.0
    container_name: confluent-kafka
    hostname: kafka
    environment:
      # KRaft — no ZooKeeper required
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg==   # fixed UUID for repeatable dev env

      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Single-node defaults
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      # JMX — expose on port 9999 so the jmx-exporter sidecar can connect
      KAFKA_JMX_PORT: 9999
      KAFKA_JMX_HOSTNAME: kafka
      KAFKA_JMX_OPTS: >-
        -Dcom.sun.jndi.rmiregistry.disableAnonBind=true
        -Djava.rmi.server.hostname=kafka

    ports:
      - "9092:9092"    # Kafka bootstrap (for LenseIQ health checks)
      - "9999:9999"    # JMX (debug access from host; exporter uses internal network)
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Prometheus JMX Exporter — exposes Kafka JMX as HTTP /metrics ─
  # Access at http://localhost:4000/metrics
  jmx-exporter:
    image: prom/jmx-exporter:latest
    container_name: kafka-jmx-exporter
    command:
      - "5556"                          # internal HTTP port
      - /etc/jmx-exporter/config.yml
    ports:
      - "4000:5556"                     # host:container → localhost:4000/metrics
    volumes:
      - ./config/jmx-exporter.yml:/etc/jmx-exporter/config.yml:ro
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  mission-control-postgres:
